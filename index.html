<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Language Translator</title>
<style>
  body { 
    font-family: 'Segoe UI', Arial, sans-serif; 
    margin: 0; 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column;
    background-color: #f5f7fa;
  }
  h1 { 
    text-align: center; 
    padding: 25px; 
    margin: 0; 
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    letter-spacing: 2px;
  }
  .content-wrapper { 
    display: flex; 
    flex: 1;
    margin: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    border-radius: 10px;
    background: white;
  }
  #left-panel { 
    width: 35%; 
    border-right: 2px solid #e6e9ef;
    padding: 20px;
    display: flex; 
    flex-direction: column;
    background-color: white;
    border-radius: 10px 0 0 10px;
  }
  input[type="text"] { 
    padding: 12px;
    font-size: 16px;
    width: calc(100% - 24px);
    border: 2px solid #e6e9ef;
    border-radius: 6px;
    transition: all 0.3s ease;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: #1e3c72;
    box-shadow: 0 0 5px rgba(30,60,114,0.2);
  }
  #suggestions { 
    margin-top: 15px;
    flex: 1;
    overflow-y: auto;
    border: 2px solid #e6e9ef;
    border-radius: 6px;
    padding: 5px;
    background-color: #ffffff;
  }
  #suggestions div { 
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 4px;
    margin: 2px 0;
    transition: all 0.2s ease;
  }
  #suggestions div:hover { 
    background-color: #f0f4f8;
    transform: translateX(5px);
  }
  #right-panel { 
    width: 65%;
    padding: 20px;
    display: flex;
    flex-wrap: wrap;
    overflow-y: auto;
    align-content: flex-start;
    background-color: #ffffff;
    border-radius: 0 10px 10px 0;
  }
  .letter-img { 
    margin: 8px;
    width: 20%;    /* 5 images per row approximately */
    height: auto;
    object-fit: contain;
    border: 2px solid #e6e9ef;
    border-radius: 8px;
    transition: all 0.3s ease;
    background-color: white;
    padding: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }
  .letter-img:hover {
    transform: translateY(-5px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    border-color: #1e3c72;
  }

</style>
</head>
<body>
<h1>SIGN LANGUAGE TRANSLATOR</h1>
<div class="content-wrapper">
  <div id="left-panel">
    <input type="text" id="input-word" placeholder="Type a word or sentence...">
    <div id="suggestions"></div>
  </div>

  <div id="right-panel"></div>
</div>

<script>
  const inputField = document.getElementById('input-word');
  const suggestionsDiv = document.getElementById('suggestions');
  const rightPanel = document.getElementById('right-panel');

  inputField.addEventListener('input', async () => {
    const value = inputField.value;
    updateSuggestions(value);
    updateImages(value.toUpperCase());
  });

 async function updateSuggestions(text) {
    suggestionsDiv.innerHTML = '';
    if (!text) return;
    try {
        const res = await fetch(`http://localhost:4567/suggestions?prefix=${encodeURIComponent(text)}`);
        const suggestions = await res.json();
        suggestions.forEach(s => {
            const div = document.createElement('div');
            div.textContent = s;
            div.addEventListener('click', () => {
                inputField.value = s;
                updateImages(s.toUpperCase());
                suggestionsDiv.innerHTML = '';
            });
            suggestionsDiv.appendChild(div);
        });
    } catch(err) { console.error(err); }
}

async function updateImages(text) {
    rightPanel.innerHTML = '';
    try {
        const res = await fetch(`http://localhost:4567/images?text=${encodeURIComponent(text)}`);
        const paths = await res.json();
        paths.forEach(p => {
            const img = document.createElement('img');
            img.src = p;
            img.className = 'letter-img';
            rightPanel.appendChild(img);
        });
    } catch(err) { console.error(err); }
}

</script>

</body>
</html>
